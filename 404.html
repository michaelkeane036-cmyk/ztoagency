<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A0F1E; --card: #111827;
      --white: #F8FAFC; --text-muted: #94A3B8;
      --gold: #FBBF24; --border: rgba(255,255,255,0.1);
      --ff-head: 'Bricolage Grotesque', system-ui, sans-serif;
      --ff-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--ff-body); background: var(--navy); color: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(255,255,255,0.025) 0%, transparent 70%);
    }
    .wrap { max-width: 520px; position: relative; z-index: 1; animation: fadeUp 0.7s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .err-num {
      font-family: var(--ff-head); font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800; letter-spacing: -0.06em; line-height: 1;
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    h1 {
      font-family: var(--ff-head); font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 800; letter-spacing: -0.03em; margin-bottom: 14px;
    }
    p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 36px; }
    p strong { color: var(--white); }

    .err-links {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 40px;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--white); color: var(--navy);
      font-family: var(--ff-head); font-weight: 700; font-size: 0.9rem;
      padding: 13px 24px; border-radius: 10px; text-decoration: none;
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .btn-home:hover { box-shadow: 0 0 24px rgba(255,255,255,0.16); transform: translateY(-2px); }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2); color: var(--white);
      font-weight: 600; font-size: 0.9rem; padding: 12px 22px; border-radius: 10px;
      text-decoration: none; transition: border-color 0.3s, background 0.3s;
    }
    .btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.05); }

    .err-nav {
      display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
    }
    .err-nav a {
      font-size: 0.84rem; color: var(--text-muted); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px;
      transition: color 0.2s;
    }
    .err-nav a:hover { color: var(--white); }

    .err-logo {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font-family: var(--ff-head); font-size: 1.3rem; font-weight: 800;
      color: var(--white); text-decoration: none;
    }
    .err-logo .z { color: var(--gold); }
  </style>
</head>
<body>

        Book a Free Call

    </div>

    <nav class="err-nav" aria-label="Quick links">

</html>
