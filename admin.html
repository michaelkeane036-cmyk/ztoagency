<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — ZTO Marketing Agency</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0A0F1E; --dark: #0F172A; --card: #111827;
      --gold: #FBBF24; --white: #F8FAFC;
      --text: #F1F5F9; --muted: #94A3B8; --border: rgba(255,255,255,0.10);
      --green: #34d399; --red: #f87171; --blue: #60a5fa; --orange: #fb923c;
      --ff-head: 'Bricolage Grotesque', system-ui, sans-serif;
      --ff-body: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--ff-body); background: var(--navy); color: var(--text); min-height: 100vh; }
    #admin-root { min-height: 100vh; }

    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: var(--dark); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto;
    }
    .sidebar-logo {
      font-family: var(--ff-head); font-size: 1.4rem; font-weight: 800;
      padding: 0 24px 20px; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; color: var(--white);
    }
    .sidebar-logo .z { color: var(--gold); }
    .admin-tag { font-size: 0.65rem; background: rgba(251,191,36,0.15); color: var(--gold);
      padding: 2px 8px; border-radius: 4px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-left: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 24px;
      color: var(--muted); cursor: pointer; font-size: 0.9rem; font-weight: 500;
      border: none; background: none; width: 100%; text-align: left;
      transition: color 0.2s, background 0.2s;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--gold); background: rgba(251,191,36,0.08); }
    .sidebar-footer { margin-top: auto; padding: 16px 24px; border-top: 1px solid var(--border); }
    .admin-name { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
    .admin-name strong { color: var(--text); display: block; }
    .logout-btn {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      color: #f87171; padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; font-family: var(--ff-body); width: 100%; transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(248,113,113,0.2); }

    .main { margin-left: 240px; flex: 1; padding: 40px 36px; }
    .page-title { font-family: var(--ff-head); font-size: 1.6rem; font-weight: 700; margin-bottom: 28px; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .stat-value { font-family: var(--ff-head); font-size: 2rem; font-weight: 700; }
    .stat-value.gold  { color: var(--gold);  }
    .stat-value.green { color: var(--green); }
    .stat-value.blue  { color: var(--blue);  }

    .section-head { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .card-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .empty { color: var(--muted); font-size: 0.875rem; padding: 8px 0; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; color: var(--muted); font-weight: 500; font-size: 0.72rem;
         text-transform: uppercase; letter-spacing: 0.08em; padding: 0 12px 12px 0;
         border-bottom: 1px solid var(--border); }
    td { padding: 12px 12px 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; text-transform: capitalize; }
    .badge-green  { background: rgba(52,211,153,0.12);  color: var(--green);  }
    .badge-yellow { background: rgba(251,191,36,0.12);  color: var(--gold);   }
    .badge-red    { background: rgba(248,113,113,0.12); color: var(--red);    }
    .badge-blue   { background: rgba(96,165,250,0.12);  color: var(--blue);   }
    .badge-orange { background: rgba(251,146,60,0.12);  color: var(--orange); }

    /* Buttons */
    .btn-primary {
      background: var(--gold); color: #0A0F1E; border: none; border-radius: 8px;
      padding: 10px 18px; font-weight: 700; font-family: var(--ff-head);
      cursor: pointer; font-size: 0.875rem; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; border: none;
      cursor: pointer; font-family: var(--ff-body); font-weight: 600; transition: opacity 0.2s;
    }
    .btn-sm:hover { opacity: 0.8; }
    .btn-sm.green { background: rgba(52,211,153,0.15); color: var(--green); }
    .btn-sm.red   { background: rgba(248,113,113,0.15); color: var(--red); }
    .btn-sm.blue  { background: rgba(96,165,250,0.15);  color: var(--blue); }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .form-input, .form-select {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--ff-body);
      font-size: 0.875rem; padding: 10px 12px; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-select option { background: var(--dark); }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 24px;
    }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 520px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .modal-title { font-family: var(--ff-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 10px 18px; border-radius: 8px; cursor: pointer; font-family: var(--ff-body);
      font-size: 0.875rem; transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--white); color: var(--text); }

    /* Messages */
    .msg-thread { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding: 4px 0 16px; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.875rem; line-height: 1.5; }
    .msg-bubble.admin  { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.2); align-self: flex-end; }
    .msg-bubble.client { background: rgba(255,255,255,0.06); border: 1px solid var(--border); align-self: flex-start; }
    .msg-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
    .msg-input-row { display: flex; gap: 10px; margin-top: 12px; }
    .msg-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--ff-body);
      font-size: 0.875rem; padding: 10px 14px; outline: none;
    }
    .msg-input:focus { border-color: var(--gold); }

    .select-client {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--ff-body);
      font-size: 0.875rem; padding: 10px 14px; outline: none; width: 100%; margin-bottom: 16px;
    }
    .select-client option { background: var(--dark); }

    .loader { color: var(--muted); text-align: center; padding: 80px 20px; font-size: 1rem; }
    .success-msg { color: var(--green); font-size: 0.82rem; margin-top: 8px; }
    .error-msg   { color: var(--red);   font-size: 0.82rem; margin-top: 8px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px 16px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="admin-root"><div class="loader">Loading admin dashboard…</div></div>

  <script type="text/babel">
    const API = 'http://localhost:4000/api';

    const fmt     = n  => '₦' + Number(n).toLocaleString('en-NG');
    const fmtDate = s  => s ? new Date(s).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }) : '—';
    const fmtTime = s  => s ? new Date(s).toLocaleString('en-NG',    { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';

    function Badge({ text }) {
      const map = {
        new:'badge-blue', contacted:'badge-yellow', converted:'badge-green', lost:'badge-red',
        active:'badge-green', paused:'badge-yellow', completed:'badge-blue',
        success:'badge-green', pending:'badge-yellow', failed:'badge-red',
        ignite:'badge-blue', accelerate:'badge-orange', dominate:'badge-green',
      };
      return <span className={`badge ${map[text] || 'badge-blue'}`}>{text || '—'}</span>;
    }

    /* ── Sidebar ── */
    function Sidebar({ admin, active, onNav, onLogout }) {
      const items = [
        { key:'overview',  label:'Overview',  icon:'📊' },
        { key:'leads',     label:'Leads',     icon:'📥' },
        { key:'clients',   label:'Clients',   icon:'👥' },
        { key:'campaigns', label:'Campaigns', icon:'📣' },
        { key:'payments',  label:'Payments',  icon:'💳' },
        { key:'messages',  label:'Messages',  icon:'💬' },
      ];
      return (
        <aside className="sidebar">
          <div className="sidebar-logo">
            <span className="z">Z</span>TO<span className="admin-tag">Admin</span>
          </div>
          {items.map(i => (
            <button key={i.key} className={`nav-item ${active === i.key ? 'active' : ''}`}
              onClick={() => onNav(i.key)}>
              <span>{i.icon}</span>{i.label}
            </button>
          ))}
          <div className="sidebar-footer">
            <div className="admin-name"><strong>{admin?.full_name}</strong>Administrator</div>
            <button className="logout-btn" onClick={onLogout}>Sign out</button>
          </div>
        </aside>
      );
    }

    /* ── Overview ── */
    function OverviewPage({ data }) {
      return (
        <>
          <h1 className="page-title">Overview</h1>
          <div className="stat-grid">
            <div className="stat-card">
              <div className="stat-label">New Leads</div>
              <div className="stat-value gold">{data.new_leads}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Active Clients</div>
              <div className="stat-value blue">{data.active_clients}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Revenue Collected</div>
              <div className="stat-value green">{fmt(data.total_revenue)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Payments</div>
              <div className="stat-value">{data.payments.length}</div>
            </div>
          </div>

          <div className="card">
            <div className="section-head">Recent Leads</div>
            {data.leads.slice(0,5).length === 0
              ? <p className="empty">No leads yet.</p>
              : <table>
                  <thead><tr><th>Name</th><th>Contact</th><th>Business</th><th>Status</th><th>Date</th></tr></thead>
                  <tbody>{data.leads.slice(0,5).map(l => (
                    <tr key={l.id}>
                      <td style={{fontWeight:600}}>{l.name}</td>
                      <td style={{color:'var(--muted)'}}>{l.contact}</td>
                      <td>{l.business_type}</td>
                      <td><Badge text={l.status} /></td>
                      <td>{fmtDate(l.created_at)}</td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </div>
        </>
      );
    }

    /* ── Leads ── */
    function LeadsPage({ leads: initialLeads }) {
      const [leads, setLeads] = React.useState(initialLeads);
      const STATUS = ['new', 'contacted', 'converted', 'lost'];

      async function updateStatus(id, status) {
        const res  = await fetch(`${API}/admin/leads/${id}`, {
          method: 'PATCH', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        if (res.ok) setLeads(prev => prev.map(l => l.id === id ? { ...l, status } : l));
      }

      return (
        <>
          <h1 className="page-title">Leads</h1>
          <div className="card">
            {leads.length === 0
              ? <p className="empty">No leads submitted yet.</p>
              : <table>
                  <thead><tr><th>Name</th><th>Contact</th><th>Business</th><th>Challenge</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
                  <tbody>{leads.map(l => (
                    <tr key={l.id}>
                      <td style={{fontWeight:600}}>{l.name}</td>
                      <td style={{color:'var(--muted)',fontSize:'0.82rem'}}>{l.contact}</td>
                      <td>{l.business_type}</td>
                      <td style={{color:'var(--muted)',fontSize:'0.82rem',maxWidth:200}}>{l.challenge || '—'}</td>
                      <td><Badge text={l.status} /></td>
                      <td style={{fontSize:'0.8rem',color:'var(--muted)'}}>{fmtDate(l.created_at)}</td>
                      <td>
                        <select
                          value={l.status}
                          onChange={e => updateStatus(l.id, e.target.value)}
                          style={{background:'rgba(255,255,255,0.05)',border:'1px solid var(--border)',
                            borderRadius:6,color:'var(--text)',fontSize:'0.78rem',padding:'5px 8px',
                            fontFamily:'var(--ff-body)',cursor:'pointer',outline:'none'}}>
                          {STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </div>
        </>
      );
    }

    /* ── Clients ── */
    function ClientsPage({ clients: initialClients }) {
      const [clients, setClients] = React.useState(initialClients);
      const [modal,   setModal]   = React.useState(false);
      const [form,    setForm]    = React.useState({ email:'', full_name:'', plan:'ignite' });
      const [msg,     setMsg]     = React.useState('');
      const [err,     setErr]     = React.useState('');

      async function createClient(e) {
        e.preventDefault(); setMsg(''); setErr('');
        const res  = await fetch(`${API}/admin/clients`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(form),
        });
        const data = await res.json();
        if (res.ok) {
          setClients(prev => [data.user, ...prev]);
          setMsg('Client created. Welcome email sent.');
          setForm({ email:'', full_name:'', plan:'ignite' });
          setTimeout(() => { setModal(false); setMsg(''); }, 2000);
        } else setErr(data.errors?.[0]?.msg || data.error);
      }

      async function toggleActive(id, is_active) {
        const res = await fetch(`${API}/admin/clients/${id}`, {
          method: 'PATCH', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_active: !is_active }),
        });
        if (res.ok) setClients(prev => prev.map(c => c.id === id ? { ...c, is_active: !is_active } : c));
      }

      const inputStyle = { className:'form-input' };

      return (
        <>
          <h1 className="page-title">Clients</h1>

          {modal && (
            <div className="modal-bg" onClick={e => e.target === e.currentTarget && setModal(false)}>
              <div className="modal-box">
                <div className="modal-title">Create Client Account</div>
                <form onSubmit={createClient}>
                  <div className="form-grid" style={{marginBottom:16}}>
                    <div className="form-field">
                      <label>Full Name</label>
                      <input className="form-input" value={form.full_name}
                        onChange={e => setForm(p=>({...p,full_name:e.target.value}))}
                        placeholder="e.g. Adaeze Okonkwo" required />
                    </div>
                    <div className="form-field">
                      <label>Email Address</label>
                      <input className="form-input" type="email" value={form.email}
                        onChange={e => setForm(p=>({...p,email:e.target.value}))}
                        placeholder="client@company.com" required />
                    </div>
                    <div className="form-field">
                      <label>Plan</label>
                      <select className="form-select" value={form.plan}
                        onChange={e => setForm(p=>({...p,plan:e.target.value}))}>
                        <option value="ignite">Ignite — ₦250K/mo</option>
                        <option value="accelerate">Accelerate — ₦600K/mo</option>
                        <option value="dominate">Dominate — Custom</option>
                      </select>
                    </div>
                  </div>
                  {err && <p className="error-msg">{err}</p>}
                  {msg && <p className="success-msg">{msg}</p>}
                  <div className="modal-actions">
                    <button type="button" className="btn-cancel" onClick={() => setModal(false)}>Cancel</button>
                    <button type="submit" className="btn-primary">Create & Send Welcome Email</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="card">
            <div className="card-row">
              <div className="section-head" style={{margin:0}}>All Clients ({clients.length})</div>
              <button className="btn-primary" onClick={() => setModal(true)}>+ New Client</button>
            </div>
            {clients.length === 0
              ? <p className="empty">No clients yet. Create one above.</p>
              : <table>
                  <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th><th>Action</th></tr></thead>
                  <tbody>{clients.map(c => (
                    <tr key={c.id}>
                      <td style={{fontWeight:600}}>{c.full_name}</td>
                      <td style={{color:'var(--muted)',fontSize:'0.82rem'}}>{c.email}</td>
                      <td><Badge text={c.plan || 'none'} /></td>
                      <td><span className={`badge ${c.is_active ? 'badge-green' : 'badge-red'}`}>{c.is_active ? 'active' : 'inactive'}</span></td>
                      <td style={{fontSize:'0.8rem',color:'var(--muted)'}}>{fmtDate(c.created_at)}</td>
                      <td>
                        <button className={`btn-sm ${c.is_active ? 'red' : 'green'}`}
                          onClick={() => toggleActive(c.id, c.is_active)}>
                          {c.is_active ? 'Deactivate' : 'Activate'}
                        </button>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </div>
        </>
      );
    }

    /* ── Campaigns ── */
    function CampaignsPage({ clients }) {
      const [campaigns, setCampaigns] = React.useState([]);
      const [modal, setModal]         = React.useState(false);
      const [form,  setForm]          = React.useState({ user_id:'', name:'', channel:'Meta', spend:0, revenue:0, roas:0 });
      const [msg,   setMsg]           = React.useState('');

      React.useEffect(() => {
        // Fetch all campaigns for all clients
        Promise.all(
          clients.map(c =>
            fetch(`${API}/clients/dashboard`, { credentials: 'include' })
              .then(r => r.json()).then(d => d.campaigns || []).catch(() => [])
          )
        ).then(all => setCampaigns(all.flat()));
      }, []);

      async function createCampaign(e) {
        e.preventDefault(); setMsg('');
        const res  = await fetch(`${API}/admin/campaigns`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(form),
        });
        const data = await res.json();
        if (res.ok) { setCampaigns(p=>[data.campaign,...p]); setMsg('Campaign created.'); setTimeout(()=>{setModal(false);setMsg('');},1500); }
      }

      return (
        <>
          <h1 className="page-title">Campaigns</h1>

          {modal && (
            <div className="modal-bg" onClick={e => e.target===e.currentTarget && setModal(false)}>
              <div className="modal-box">
                <div className="modal-title">New Campaign</div>
                <form onSubmit={createCampaign}>
                  <div className="form-grid" style={{marginBottom:16}}>
                    <div className="form-field" style={{gridColumn:'1/-1'}}>
                      <label>Client</label>
                      <select className="form-select" value={form.user_id}
                        onChange={e=>setForm(p=>({...p,user_id:e.target.value}))} required>
                        <option value="">Select client</option>
                        {clients.map(c=><option key={c.id} value={c.id}>{c.full_name}</option>)}
                      </select>
                    </div>
                    <div className="form-field">
                      <label>Campaign Name</label>
                      <input className="form-input" value={form.name}
                        onChange={e=>setForm(p=>({...p,name:e.target.value}))} required placeholder="e.g. Meta Retargeting Q1" />
                    </div>
                    <div className="form-field">
                      <label>Channel</label>
                      <select className="form-select" value={form.channel}
                        onChange={e=>setForm(p=>({...p,channel:e.target.value}))}>
                        {['Meta','Google','TikTok','LinkedIn','Email','SEO'].map(ch=><option key={ch}>{ch}</option>)}
                      </select>
                    </div>
                    <div className="form-field">
                      <label>Ad Spend (₦)</label>
                      <input className="form-input" type="number" value={form.spend}
                        onChange={e=>setForm(p=>({...p,spend:+e.target.value}))} min="0" />
                    </div>
                    <div className="form-field">
                      <label>Revenue (₦)</label>
                      <input className="form-input" type="number" value={form.revenue}
                        onChange={e=>setForm(p=>({...p,revenue:+e.target.value}))} min="0" />
                    </div>
                    <div className="form-field">
                      <label>ROAS</label>
                      <input className="form-input" type="number" step="0.01" value={form.roas}
                        onChange={e=>setForm(p=>({...p,roas:+e.target.value}))} min="0" />
                    </div>
                  </div>
                  {msg && <p className="success-msg">{msg}</p>}
                  <div className="modal-actions">
                    <button type="button" className="btn-cancel" onClick={()=>setModal(false)}>Cancel</button>
                    <button type="submit" className="btn-primary">Create Campaign</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="card">
            <div className="card-row">
              <div className="section-head" style={{margin:0}}>All Campaigns ({campaigns.length})</div>
              <button className="btn-primary" onClick={()=>setModal(true)}>+ New Campaign</button>
            </div>
            {campaigns.length === 0
              ? <p className="empty">No campaigns yet.</p>
              : <table>
                  <thead><tr><th>Name</th><th>Channel</th><th>Status</th><th>Spend</th><th>Revenue</th><th>ROAS</th></tr></thead>
                  <tbody>{campaigns.map(c=>(
                    <tr key={c.id}>
                      <td style={{fontWeight:600}}>{c.name}</td>
                      <td>{c.channel}</td>
                      <td><Badge text={c.status}/></td>
                      <td>{fmt(c.spend)}</td>
                      <td style={{color:'var(--green)'}}>{fmt(c.revenue)}</td>
                      <td style={{color:'var(--gold)',fontWeight:600}}>{Number(c.roas).toFixed(2)}×</td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </div>
        </>
      );
    }

    /* ── Payments ── */
    function PaymentsPage({ payments }) {
      const total = payments.reduce((s, p) => s + (p.amount / 100), 0);
      return (
        <>
          <h1 className="page-title">Payments</h1>
          <div className="stat-grid" style={{marginBottom:24}}>
            <div className="stat-card">
              <div className="stat-label">Total Collected</div>
              <div className="stat-value green">{fmt(total)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Successful Payments</div>
              <div className="stat-value gold">{payments.length}</div>
            </div>
          </div>
          <div className="card">
            {payments.length === 0
              ? <p className="empty">No payments yet.</p>
              : <table>
                  <thead><tr><th>Plan</th><th>Amount</th><th>Status</th><th>Date</th><th>Reference</th></tr></thead>
                  <tbody>{payments.map(p=>(
                    <tr key={p.id}>
                      <td style={{textTransform:'capitalize'}}>{p.plan}</td>
                      <td style={{color:'var(--green)',fontWeight:600}}>{fmt(p.amount/100)}</td>
                      <td><Badge text={p.status}/></td>
                      <td style={{fontSize:'0.8rem',color:'var(--muted)'}}>{fmtDate(p.created_at)}</td>
                      <td style={{fontFamily:'monospace',fontSize:'0.75rem',color:'var(--muted)'}}>{p.reference}</td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </div>
        </>
      );
    }

    /* ── Messages ── */
    function MessagesPage({ clients, adminId }) {
      const [selected, setSelected] = React.useState('');
      const [messages, setMessages] = React.useState([]);
      const [input,    setInput]    = React.useState('');
      const [sending,  setSending]  = React.useState(false);
      const bottomRef = React.useRef(null);

      React.useEffect(() => {
        fetch(`${API}/admin/messages`, { credentials: 'include' })
          .then(r => r.json()).then(d => setMessages(d.messages || []));
      }, []);

      React.useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, selected]);

      const filtered = selected
        ? messages.filter(m => m.sender?.id === selected || m.receiver?.id === selected)
        : messages;

      async function send() {
        if (!input.trim() || !selected || sending) return;
        setSending(true);
        const res  = await fetch(`${API}/admin/messages`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ receiver_id: selected, content: input.trim() }),
        });
        const data = await res.json();
        if (res.ok) { setMessages(p => [data.message, ...p]); setInput(''); }
        setSending(false);
      }

      return (
        <>
          <h1 className="page-title">Messages</h1>
          <div className="card">
            <div className="section-head">Select Client</div>
            <select className="select-client" value={selected} onChange={e => setSelected(e.target.value)}>
              <option value="">— All messages —</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.full_name}</option>)}
            </select>
            <div className="msg-thread">
              {filtered.length === 0 && <p className="empty">No messages in this thread.</p>}
              {[...filtered].reverse().map(m => {
                const isAdmin = m.sender?.role === 'admin';
                return (
                  <div key={m.id} className={`msg-bubble ${isAdmin ? 'admin' : 'client'}`}>
                    <div>{m.content}</div>
                    <div className="msg-meta">{m.sender?.full_name} · {fmtTime(m.created_at)}</div>
                  </div>
                );
              })}
              <div ref={bottomRef} />
            </div>
            {selected && (
              <div className="msg-input-row">
                <input className="msg-input" value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && send()}
                  placeholder="Reply to client…" />
                <button className="btn-primary" onClick={send} disabled={sending}>Send</button>
              </div>
            )}
          </div>
        </>
      );
    }

    /* ── Root App ── */
    function AdminApp() {
      const [admin,  setAdmin]  = React.useState(null);
      const [data,   setData]   = React.useState(null);
      const [page,   setPage]   = React.useState('overview');
      const [ready,  setReady]  = React.useState(false);

      React.useEffect(() => {
        (async () => {
          try {
            const r = await fetch(`${API}/auth/me`, { credentials: 'include' });
            if (!r.ok) throw new Error();
            const { user } = await r.json();
            if (user.role !== 'admin') { window.location.href = 'portal.html'; return; }
            setAdmin(user);
            const d = await fetch(`${API}/admin/overview`, { credentials: 'include' }).then(r => r.json());
            setData(d);
            setReady(true);
          } catch { window.location.href = 'login.html'; }
        })();
      }, []);

      async function logout() {
        await fetch(`${API}/auth/logout`, { method: 'POST', credentials: 'include' });
        window.location.href = 'login.html';
      }

      if (!ready || !data) return <div className="loader">Loading admin dashboard…</div>;

      const pages = {
        overview:  <OverviewPage  data={data} />,
        leads:     <LeadsPage     leads={data.leads} />,
        clients:   <ClientsPage   clients={data.clients} />,
        campaigns: <CampaignsPage clients={data.clients} />,
        payments:  <PaymentsPage  payments={data.payments} />,
        messages:  <MessagesPage  clients={data.clients} adminId={admin.id} />,
      };

      return (
        <div className="layout">
          <Sidebar admin={admin} active={page} onNav={setPage} onLogout={logout} />
          <main className="main">{pages[page] || pages.overview}</main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);
  </script>
</body>
</html>
